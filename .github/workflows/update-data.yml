# Daily data refresh for PWM and every shared account with a Letterboxd handle.
# To activate: `gh auth refresh -s workflow`, then `git mv .github/_workflows .github/workflows`, commit & push.
# Requires repo secrets TMDB_TOKEN and OMDB_KEY.
name: Update PWM data
on:
  schedule:
    - cron: '0 9 * * *' # Every day at 09:00 UTC
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build data
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          OMDB_KEY: ${{ secrets.OMDB_KEY }}
        run: node scripts/build-data.mjs
      - name: Commit if changed
        run: |
          git config user.name "pwm-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/data.js index.html
          git diff --cached --quiet || git commit -m "chore: daily data refresh"
          git push
